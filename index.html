<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Mulish:wght@200..1000&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/css/style.css" />

    <title>Share Card</title>
  </head>

  <body>
    <div class="card">
      <h2>Share this challenge</h2>

<div class="social-icons">
    <a href="#" class="icon twitter" data-link="https://twitter.com/intent/tweet?url=https://www.frontendpro.dev">
        <img src="./src/assets/images/twitter.svg" alt="Twitter">
    </a>

    <a href="#" class="icon linkedin"
        data-link="https://www.linkedin.com/sharing/share-offsite/?url=https://www.frontendpro.dev">
        <img src="./src/assets/images/linkedin.svg" alt="LinkedIn">
    </a>

    <a href="#" class="icon facebook"
        data-link="https://www.facebook.com/sharer/sharer.php?u=https://www.frontendpro.dev">
        <img src="./src/assets/images/facebook.svg" alt="Facebook">
    </a>

    <a href="#" class="icon instagram" data-link="https://www.instagram.com/">
        <img src="./src/assets/images/instagram.svg" alt="Instagram">
    </a>

    <a href="#" class="icon pinterest"
        data-link="https://pinterest.com/pin/create/button/?url=https://www.frontendpro.dev">
        <img src="./src/assets/images/pinterest.svg" alt="Pinterest">
    </a>

    <a href="#" class="icon telegram" data-link="https://t.me/share/url?url=https://www.frontendpro.dev">
        <img src="./src/assets/images/telegram.svg" alt="Telegram">
    </a>
</div>
      <p class="copy-title">or copy link</p>

      <div class="copy-box">
        <input
          id="shareLink"
          type="text"
          readonly
          value="https://www.frontendpro.dev/frontend-coding-challenges/share-content-card-component-4Ua2rAPzYP4zpEpJFCKl/playground/C6dmwdWPsQqoeaJ3XOZu"
        />

        <button id="copyBtn">Copy</button>
      </div>
    </div>

    <script src="./src/js/script.js"></script>
  </body>
</html>
